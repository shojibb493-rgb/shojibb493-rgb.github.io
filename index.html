<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সবুজ মেডিকেল হল - খুচরা ইনভেন্টরি ও লাভ</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { margin: 0; display: flex; background-color: #f4f7f6; color: #333; }
        
        .sidebar { width: 260px; background-color: #2e7d32; color: white; height: 100vh; padding: 20px; position: fixed; z-index: 100;}
        .sidebar h2 { border-bottom: 2px solid #4caf50; padding-bottom: 10px; margin-top: 0; font-size: 1.5rem; text-align: center; }
        
        .main-content { margin-left: 260px; padding: 30px; width: calc(100% - 260px); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        /* Dashboard Stats */
        .dashboard-stats { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-box { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); flex: 1; min-width: 150px; text-align: center; border-left: 5px solid #4caf50; }
        .stat-box.profit { border-left-color: #ff9800; background-color: #fff9f0; } /* লাভের জন্য আলাদা কালার */
        .stat-box h3 { margin: 0; font-size: 1rem; color: #555; }
        .stat-box p { margin: 5px 0 0; font-size: 1.5rem; font-weight: bold; color: #2e7d32; }
        .stat-box.profit p { color: #e65100; }

        .add-section { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
        .add-section div { flex: 1; min-width: 120px; display: flex; flex-direction: column; }
        .add-section label { font-size: 0.9rem; font-weight: bold; margin-bottom: 5px; color: #555; }
        .add-section input, .add-section select { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; outline: none; }
        .add-section select { cursor: pointer; }
        .btn { background-color: #4caf50; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; height: 40px; }
        .btn:hover { background-color: #388e3c; }

        .search-container { background: white; padding: 15px 20px; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.15); margin-bottom: 20px; position: sticky; top: 0; z-index: 99; }
        .search-container input { width: 100%; padding: 12px; border: 2px solid #4caf50; border-radius: 6px; font-size: 1.1rem; outline: none; }
        
        .table-responsive { width: 100%; overflow-x: auto; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 600px;}
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #e8f5e9; color: #2e7d32; }
        
        .action-container { display: flex; gap: 5px; flex-wrap: wrap;}
        .btn-sell-strip { background-color: #e53935; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-weight: bold; }
        .btn-sell-box { background-color: #c62828; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-weight: bold; }
        .btn-add-stock { background-color: #1e88e5; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-weight: bold; }
        
        .stock-count { font-weight: bold; color: #2e7d32; font-size: 1.1rem;}
        .low-stock { color: #d32f2f; font-weight: bold; font-size: 1.1rem;}
        .price-tag { color: #00796b; font-size: 0.9rem; background: #e0f2f1; padding: 3px 8px; border-radius: 12px; margin-top: 5px; display: inline-block; }
        .profit-tag { color: #e65100; font-size: 0.85rem; font-weight: bold; }
        .loading-text { font-size: 1rem; color: #ff9800; font-weight: bold; display: none; margin-left: 10px; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: relative; padding: 15px; }
            .sidebar h2 { font-size: 1.3rem; margin-bottom: 5px; border-bottom: none; }
            .sidebar p { margin: 0; }
            .main-content { margin-left: 0; width: 100%; padding: 15px; }
            .header { flex-direction: column; text-align: center; gap: 10px; }
            .dashboard-stats { flex-direction: row; gap: 10px; }
            .stat-box h3 { font-size: 0.85rem; }
            .stat-box p { font-size: 1.2rem; }
            .add-section { flex-direction: column; align-items: stretch; }
            .add-section div { min-width: 100%; margin-bottom: 10px; }
            .btn { width: 100%; margin-top: 5px; height: 45px;}
            .search-container { padding: 10px; }
            .action-container { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
            .btn-sell-strip, .btn-sell-box, .btn-add-stock { width: 100%; padding: 10px 5px; }
            th, td { padding: 10px; font-size: 0.95rem; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>সবুজ মেডিকেল হল</h2>
        <p style="text-align: center;">খুচরা বিক্রয় ও স্টক প্যানেল</p>
    </div>

    <div class="main-content">
        <div class="header">
            <h1 style="color: #2e7d32; margin: 0; font-size: 1.5rem;">খুচরা স্টক ও মূল্য তালিকা</h1>
            <span id="loadingIndicator" class="loading-text">⏳ আপডেট হচ্ছে...</span>
        </div>

        <div class="dashboard-stats">
            <div class="stat-box">
                <h3>মোট আইটেম</h3>
                <p id="totalItemsCount">0</p>
            </div>
            <div class="stat-box">
                <h3>মালের বিক্রি মূল্য</h3>
                <p>৳ <span id="totalStockValue">0</span></p>
            </div>
            <div class="stat-box profit">
                <h3>মোট সম্ভাব্য লাভ</h3>
                <p>৳ <span id="totalExpectedProfit">0</span></p>
            </div>
        </div>

        <div class="add-section">
            <div style="flex: 2;">
                <label>ওষুধের নাম:</label>
                <input type="text" id="medName" placeholder="যেমন: Napa Syrup">
            </div>
            <div>
                <label>ধরন:</label>
                <select id="itemType" onchange="toggleForm()">
                    <option value="tablet">ট্যাবলেট/ক্যাপসুল</option>
                    <option value="syrup">সিরাপ/ইনজেকশন/পিস</option>
                </select>
            </div>
            <div id="boxPackDiv">
                <label>১ বক্সে কয় পাতা?</label>
                <input type="number" id="stripsPerBox" value="10" min="1">
            </div>
            <div>
                <label id="buyPriceLabel">কেনা দাম (৳):</label>
                <input type="number" id="medBuyingPrice" placeholder="যেমন: 12" min="0">
            </div>
            <div>
                <label id="priceLabel">বিক্রি দাম (৳):</label>
                <input type="number" id="medPrice" placeholder="যেমন: 15" min="0">
            </div>
            <div id="addBoxDiv">
                <label>বক্স যোগ করুন:</label>
                <input type="number" id="boxQty" placeholder="বক্স" min="0" value="0">
            </div>
            <div>
                <label id="addStripLabel">খুচরা যোগ করুন:</label>
                <input type="number" id="stripQty" placeholder="পরিমাণ" min="0" value="0">
            </div>
            <button class="btn" onclick="addNewMedicine()">স্টকে যোগ করুন</button>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" onkeyup="searchMedicine()" placeholder="🔍 ওষুধের নাম লিখে খুঁজুন...">
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>ওষুধের নাম</th>
                        <th>কেনা ও বিক্রি মূল্য</th>
                        <th>বর্তমান মোট স্টক</th>
                        <th>খুচরা বিক্রয় / রিস্টক</th>
                    </tr>
                </thead>
                <tbody id="stockTableBody">
                    <tr><td colspan="4" style="text-align: center;">ডাটা লোড হচ্ছে...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // এখানে আপনার নতুন গুগল অ্যাপস স্ক্রিপ্ট URL টি বসান
        const scriptURL = 'https://script.google.com/macros/library/d/1Wt1y4ueoRdufN8z6zNxD0-AwhVlXiGs6zZuxKtjhsHwqvCrrzcVVn8S8/6'; 

        function toggleForm() {
            const type = document.getElementById('itemType').value;
            if (type === 'syrup') {
                document.getElementById('boxPackDiv').style.display = 'none';
                document.getElementById('addBoxDiv').style.display = 'none';
                document.getElementById('buyPriceLabel').innerText = '১ পিসের কেনা দাম:';
                document.getElementById('priceLabel').innerText = '১ পিসের বিক্রি দাম:';
                document.getElementById('addStripLabel').innerText = 'মোট পিস যোগ করুন:';
                document.getElementById('stripsPerBox').value = '1'; 
            } else {
                document.getElementById('boxPackDiv').style.display = 'flex';
                document.getElementById('addBoxDiv').style.display = 'flex';
                document.getElementById('buyPriceLabel').innerText = '১ পাতার কেনা দাম:';
                document.getElementById('priceLabel').innerText = '১ পাতার বিক্রি দাম:';
                document.getElementById('addStripLabel').innerText = 'খুচরা পাতা যোগ করুন:';
                document.getElementById('stripsPerBox').value = '10';
            }
        }

        async function loadData() {
            document.getElementById('loadingIndicator').style.display = 'inline';
            const tbody = document.getElementById('stockTableBody');
            
            try {
                const response = await fetch(scriptURL);
                const data = await response.json();
                
                tbody.innerHTML = '';
                let grandTotalValue = 0; 
                let grandTotalProfit = 0; // মোট লাভের হিসাব
                let totalItems = 0; 
                
                if(data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">কোনো স্টক পাওয়া যায়নি!</td></tr>';
                } else {
                    data.forEach((item) => {
                        let totalStrips = parseInt(item.totalStrips) || 0;
                        let stripsPerBox = parseInt(item.stripsPerBox) || 10;
                        let pricePerStrip = parseFloat(item.price) || 0;
                        let buyingPricePerStrip = parseFloat(item.buyingPrice) || 0; // কেনা দাম
                        
                        let itemProfitPerStrip = pricePerStrip - buyingPricePerStrip; // প্রতি পাতায় লাভ
                        
                        grandTotalValue += (totalStrips * pricePerStrip);
                        grandTotalProfit += (totalStrips * itemProfitPerStrip); // মোট সম্ভাব্য লাভ
                        totalItems++;

                        let isSyrup = (stripsPerBox === 1);
                        let displayHTML = '';
                        
                        if (isSyrup) {
                            let stockStyle = totalStrips <= 3 ? "low-stock" : "stock-count";
                            displayHTML = `
                                <td><b>${item.name}</b><br><span class="profit-tag">প্রতি পিসে লাভ: ৳${itemProfitPerStrip.toFixed(2)}</span></td>
                                <td>কেনা: ৳${buyingPricePerStrip} <br> বিক্রি: ৳${pricePerStrip}</td>
                                <td class="${stockStyle}">${totalStrips} বোতল/পিস</td>
                                <td>
                                    <div class="action-container" style="display:flex;">
                                        <button class="btn-sell-strip" onclick="updateStock('${item.name}', 'strip', -1)">-১ বিক্রি</button>
                                        <button class="btn-add-stock" style="background:#4caf50;" onclick="updateStock('${item.name}', 'strip', 1)">+১ রিস্টক</button>
                                    </div>
                                </td>
                            `;
                        } else {
                            let pricePerBox = pricePerStrip * stripsPerBox;
                            let buyingPricePerBox = buyingPricePerStrip * stripsPerBox;
                            let itemProfitPerBox = itemProfitPerStrip * stripsPerBox;
                            
                            let displayBoxes = Math.floor(totalStrips / stripsPerBox);
                            let displayStrips = totalStrips % stripsPerBox;
                            let stockStyle = totalStrips <= (stripsPerBox * 2) ? "low-stock" : "stock-count";
                            
                            displayHTML = `
                                <td><b>${item.name}</b><br><span class="profit-tag">প্রতি বক্সে লাভ: ৳${itemProfitPerBox.toFixed(2)}</span></td>
                                <td>
                                    <span style="color:#555; font-size:0.9rem;">কেনা: ৳${buyingPricePerStrip}/পাতা | ৳${buyingPricePerBox}/বক্স</span><br>
                                    <span class="price-tag">বিক্রি: ৳${pricePerStrip}/পাতা | ৳${pricePerBox}/বক্স</span>
                                </td>
                                <td class="${stockStyle}">${displayBoxes} বক্স ${displayStrips} পাতা</td>
                                <td>
                                    <div class="action-container">
                                        <button class="btn-sell-strip" onclick="updateStock('${item.name}', 'strip', -1)">-১ পাতা</button>
                                        <button class="btn-sell-box" onclick="updateStock('${item.name}', 'box', -1)">-১ বক্স</button>
                                        <button class="btn-add-stock" style="background:#4caf50;" onclick="updateStock('${item.name}', 'strip', 1)">+১ পাতা</button>
                                        <button class="btn-add-stock" onclick="updateStock('${item.name}', 'box', 1)">+১ বক্স</button>
                                    </div>
                                </td>
                            `;
                        }

                        const tr = document.createElement('tr');
                        tr.innerHTML = displayHTML;
                        tbody.appendChild(tr);
                    });
                }
                
                document.getElementById('totalItemsCount').innerText = totalItems;
                document.getElementById('totalStockValue').innerText = grandTotalValue.toLocaleString('en-IN');
                document.getElementById('totalExpectedProfit').innerText = grandTotalProfit.toLocaleString('en-IN'); // লাভের ড্যাশবোর্ড আপডেট
                
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="4" style="color:red; text-align:center;">ডাটা লোড করা যায়নি। ইন্টারনেট চেক করুন!</td></tr>';
            }
            document.getElementById('loadingIndicator').style.display = 'none';
        }

        async function addNewMedicine() {
            const name = document.getElementById('medName').value.trim();
            const type = document.getElementById('itemType').value;
            const stripsPerBox = document.getElementById('stripsPerBox').value;
            const buyingPrice = document.getElementById('medBuyingPrice').value; // কেনা দাম
            const price = document.getElementById('medPrice').value;
            const boxQty = type === 'syrup' ? 0 : document.getElementById('boxQty').value;
            const stripQty = document.getElementById('stripQty').value;

            if(!name || stripsPerBox <= 0) {
                alert("দয়া করে ওষুধের নাম এবং সঠিক তথ্য দিন!"); return;
            }

            document.getElementById('loadingIndicator').style.display = 'inline';
            
            const url = `${scriptURL}?action=add&name=${encodeURIComponent(name)}&stripsPerBox=${stripsPerBox}&price=${price}&buyingPrice=${buyingPrice}&boxQty=${boxQty}&stripQty=${stripQty}`;
            await fetch(url);
            
            document.getElementById('medName').value = '';
            document.getElementById('medPrice').value = '';
            document.getElementById('medBuyingPrice').value = '';
            if (type !== 'syrup') document.getElementById('boxQty').value = '0';
            document.getElementById('stripQty').value = '0';
            document.getElementById('searchInput').value = ''; 
            
            loadData();
        }

        async function updateStock(name, unit, amount) {
            document.getElementById('loadingIndicator').style.display = 'inline';
            const url = `${scriptURL}?action=update&name=${encodeURIComponent(name)}&unit=${unit}&amount=${amount}`;
            await fetch(url);
            loadData();
        }

        function searchMedicine() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let table = document.getElementById('stockTableBody');
            let tr = table.getElementsByTagName('tr');

            for (let i = 0; i < tr.length; i++) {
                let td = tr[i].getElementsByTagName('td')[0];
                if (td) {
                    let textValue = td.textContent || td.innerText;
                    if (textValue.toLowerCase().indexOf(input) > -1) {
                        tr[i].style.display = ""; 
                    } else {
                        tr[i].style.display = "none"; 
                    }
                }
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
